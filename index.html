<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Mark - Multi Access</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; }
        iframe { width: 100%; height: 100%; border: none; }
        #overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px 20px; border-radius: 25px; font-family: Arial; font-size: 14px; z-index: 999; border: 1px solid #00ff00; }
    </style>
</head>
<body>
    <div id="overlay">الكود المستخدم: 6188310641</div>
    <iframe src="/api/proxy" id="platformFrame"></iframe>

    <script>
        const iframe = document.getElementById('platformFrame');
        const MY_CODE = "6188310641";

        iframe.onload = function() {
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                // محاولة البحث عن حقل الإدخال وحقن الكود
                const input = doc.querySelector('input[type="text"]') || doc.querySelector('input');
                if (input) {
                    input.value = MY_CODE;
                    // تفعيل زر الدخول بعد ثانية
                    setTimeout(() => {
                        const btn = doc.querySelector('button') || doc.querySelector('input[type="submit"]');
                        if (btn) btn.click();
                    }, 1000);
                }
            } catch (e) {
                console.log("Cross-Origin restriction detected. Manual entry might be needed.");
            }
        };
    </script>
</body>
</html>
